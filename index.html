<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報科 単語クイズ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
         background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 1.5rem 1rem 4rem; }
  .wrap { max-width: 700px; margin: 0 auto; }

  /* ===== 共通 ===== */
  .quiz-header { margin-bottom: 1.25rem; }
  .quiz-title  { font-size: 20px; font-weight: 500; }
  .quiz-sub    { font-size: 13px; color: #6b6b68; margin-top: 4px; }
  .card { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 12px;
          padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .btn { background: transparent; border: 0.5px solid #b4b2a9; border-radius: 8px;
         padding: 8px 18px; font-size: 14px; color: #1a1a18; cursor: pointer;
         font-family: inherit; transition: background 0.15s; }
  .btn:hover:not(:disabled) { background: #f5f4f0; }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.primary { background: #378ADD; border-color: #378ADD; color: #fff; }
  .btn.primary:hover:not(:disabled) { background: #185FA5; border-color: #185FA5; }

  /* ===== 出席番号選択 ===== */
  .ss-title { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .ss-sub   { font-size: 13px; color: #6b6b68; margin-bottom: 1.5rem; }
  .ss-grid  { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .ss-btn   { background: #fff; border: 0.5px solid #dddcd6; border-radius: 8px;
              padding: 14px 0; font-size: 16px; font-weight: 500; color: #1a1a18;
              cursor: pointer; text-align: center; transition: all 0.15s; font-family: inherit; }
  .ss-btn:hover  { background: #EBF3FC; border-color: #378ADD; color: #378ADD; }
  .ss-btn.sel    { background: #378ADD; border-color: #378ADD; color: #fff; }
  .ss-btn.done   { border-color: #639922; color: #639922; }
  .ss-btn.done.sel { background: #378ADD; border-color: #378ADD; color: #fff; }
  .ss-start { width: 100%; padding: 12px; font-size: 15px; }

  /* ===== プログレス ===== */
  .progress-bg   { height: 4px; background: #dddcd6; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 4px; background: #378ADD; border-radius: 2px; transition: width 0.4s ease; }

  /* ===== クイズカード ===== */
  .q-num      { font-size: 11px; font-weight: 500; color: #378ADD; letter-spacing: 0.06em; margin-bottom: 10px; }
  .q-meaning  { font-size: 17px; font-weight: 500; line-height: 1.7; margin-bottom: 14px; }
  .choices-5  { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn { background: #f5f4f0; border: 0.5px solid #dddcd6; border-radius: 8px;
                padding: 10px 14px; font-size: 14px; color: #1a1a18; cursor: pointer;
                text-align: left; transition: background 0.15s, border-color 0.15s; font-family: inherit; }
  .choice-btn:hover:not(.disabled) { background: #fff; border-color: #b4b2a9; }
  .choice-btn.correct  { background: #EAF3DE; border-color: #639922; color: #3B6D11; cursor: default; }
  .choice-btn.wrong    { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; cursor: default; }
  .choice-btn.disabled { cursor: default; }
  .feedback { display: none; font-size: 13px; margin-top: 12px; padding: 8px 12px;
              border-radius: 6px; line-height: 1.7; }
  .feedback.show    { display: block; }
  .feedback.correct { background: #EAF3DE; color: #3B6D11; }
  .feedback.wrong   { background: #FCEBEB; color: #A32D2D; }
  .nav-row  { display: flex; justify-content: flex-end; margin-top: 1rem; }
  .q-counter { font-size: 13px; color: #6b6b68; }

  /* ===== 結果 ===== */
  .result-card  { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 12px;
                  padding: 2rem 1.5rem; text-align: center; }
  .score-big    { font-size: 52px; font-weight: 500; color: #378ADD; line-height: 1; }
  .score-denom  { font-size: 22px; color: #b4b2a9; }
  .score-pct    { font-size: 14px; color: #6b6b68; margin-top: 6px; margin-bottom: 1rem; }
  .score-msg    { font-size: 14px; line-height: 1.7; margin-bottom: 1.5rem; }
  .review-list  { text-align: left; }
  .review-item  { padding: 10px 0; border-top: 0.5px solid #e0dfd8; font-size: 13px;
                  color: #6b6b68; line-height: 1.7; }
  .review-row   { display: flex; align-items: flex-start; gap: 8px; }
  .mark { display: inline-flex; align-items: center; justify-content: center;
          width: 18px; height: 18px; border-radius: 50%; font-size: 11px;
          font-weight: 500; flex-shrink: 0; margin-top: 3px; }
  .mark.ok { background: #EAF3DE; color: #3B6D11; }
  .mark.ng { background: #FCEBEB; color: #A32D2D; }
  .ans-correct { color: #3B6D11; font-weight: 500; }
  .ans-wrong   { color: #A32D2D; }
  .sync-note { font-size: 12px; color: #6b6b68; margin-top: 0.5rem; }
  .restart-btn { margin-top: 1.5rem; padding: 10px 24px; font-size: 14px; }

  /* ===== 管理者 ===== */
  #admin-wrap { display: none; }
  .adm-title  { font-size: 18px; font-weight: 500; }
  .adm-pass   { display: flex; gap: 8px; margin-bottom: 1rem; }
  .adm-pass input { flex: 1; border: 0.5px solid #dddcd6; border-radius: 8px;
                    padding: 8px 12px; font-size: 14px; font-family: inherit; outline: none; }
  .adm-pass input:focus { border-color: #378ADD; }
  .adm-tbl  { width: 100%; border-collapse: collapse; font-size: 13px; }
  .adm-tbl th { background: #f5f4f0; padding: 8px 10px; text-align: left;
                border: 0.5px solid #e0dfd8; font-size: 12px; color: #6b6b68; }
  .adm-tbl td { padding: 8px 10px; border: 0.5px solid #e0dfd8; vertical-align: top; }
  .adm-tbl tr:nth-child(even) td { background: #faf9f6; }
  .bar-bg   { width: 80px; height: 6px; background: #e0dfd8; border-radius: 3px;
              display: inline-block; vertical-align: middle; }
  .bar-fill { height: 6px; border-radius: 3px; display: block; }
  .wrong-txt { font-size: 11px; color: #A32D2D; line-height: 1.8; }
  .adm-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }

  .footer-note { position: fixed; bottom: 0; right: 0; left: 0;
    background: rgba(245,244,240,0.92); backdrop-filter: blur(4px);
    border-top: 0.5px solid #e0dfd8; padding: 6px 16px; font-size: 11px;
    color: #888780; text-align: right; line-height: 1.6; z-index: 999; }
  @media (max-width: 480px) { .ss-grid { grid-template-columns: repeat(5, 1fr); } }
</style>
</head>
<body>

<!-- ★ 出席番号選択 -->
<div id="ss-wrap" class="wrap">
  <div class="quiz-header">
    <div class="ss-title">情報科 単語クイズ</div>
    <div class="ss-sub">出席番号を選んでからスタートしてください（5択・全20問）</div>
  </div>
  <div class="card">
    <div class="ss-grid" id="ss-grid"></div>
    <button class="btn primary ss-start" id="ss-start-btn" onclick="startQuiz()" disabled>スタート →</button>
  </div>
  <div style="text-align:right; margin-top:10px;">
    <button style="background:none;border:none;color:#378ADD;font-size:12px;cursor:pointer;text-decoration:underline;font-family:inherit;" onclick="showAdmin()">管理者ページ</button>
  </div>
</div>

<!-- ★ クイズ画面 -->
<div id="quiz-wrap" class="wrap" style="display:none;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
    <span id="student-badge" style="font-size:13px;font-weight:500;color:#378ADD;"></span>
    <button style="background:none;border:none;font-size:12px;color:#888780;cursor:pointer;font-family:inherit;" onclick="backToSelect()">← 出席番号選択に戻る</button>
  </div>
  <div class="progress-bg"><div class="progress-fill" id="prog" style="width:5%"></div></div>
  <div id="quiz-body"></div>
  <div class="nav-row" id="nav-row" style="display:none;">
    <span class="q-counter" id="q-counter"></span>
    &nbsp;&nbsp;
    <button class="btn primary" id="next-btn" onclick="nextQ()">次へ →</button>
  </div>
</div>

<!-- ★ 管理者画面 -->
<div id="admin-wrap" class="wrap">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
    <span class="adm-title">📊 管理者ページ</span>
    <button class="btn" onclick="hideAdmin()">← 生徒画面に戻る</button>
  </div>
  <div id="adm-lock">
    <div style="font-size:13px;color:#6b6b68;margin-bottom:8px;">管理者パスワードを入力してください</div>
    <div class="adm-pass">
      <input type="password" id="adm-pass-inp" placeholder="パスワード" onkeydown="if(event.key==='Enter')unlockAdmin()">
      <button class="btn primary" onclick="unlockAdmin()">確認</button>
    </div>
    <div id="adm-err" style="font-size:12px;color:#A32D2D;display:none;">パスワードが違います</div>
  </div>
  <div id="adm-content" style="display:none;">
    <div class="card" style="margin-bottom:1rem;">
      <div style="font-size:13px;font-weight:500;margin-bottom:8px;">📡 Googleスプレッドシート連携</div>
      <div style="font-size:12px;color:#6b6b68;margin-bottom:8px;">Apps Script のウェブアプリURLを入力すると、解答結果が自動でスプレッドシートに送信されます。</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="gas-url-input" placeholder="https://script.google.com/macros/s/.../exec"
          style="flex:1;min-width:200px;border:0.5px solid #dddcd6;border-radius:8px;padding:8px 12px;font-size:12px;font-family:inherit;outline:none;">
        <button class="btn primary" onclick="saveGasUrl()" style="font-size:13px;white-space:nowrap;">保存</button>
        <button class="btn" onclick="testGasUrl()" style="font-size:13px;white-space:nowrap;">テスト送信</button>
      </div>
      <div id="gas-status" style="font-size:12px;margin-top:6px;"></div>
    </div>
    <div class="adm-actions">
      <button class="btn" onclick="exportCSV()">📥 CSVダウンロード</button>
      <button class="btn" onclick="clearData()" style="color:#A32D2D;border-color:#E24B4A;">🗑 全データ削除</button>
    </div>
    <div style="overflow-x:auto;"><table class="adm-tbl" id="adm-tbl"></table></div>
  </div>
</div>

<div class="footer-note">問題は全教科書用語リスト（695語）からランダム出題されます。</div>

<script>
/* ================================================================
   単語データ
   ================================================================ */

// ---- 出席番号選択 ----
function buildStudentSelect() {
  const grid = document.getElementById("ss-grid");
  grid.innerHTML = "";
  const results = getResults();
  for (let i = 1; i <= 25; i++) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "ss-btn" + (results[i] ? " done" : "");
    btn.textContent = i;
    if (results[i]) {
      const last = results[i][results[i].length - 1];
      btn.title = "受験済（" + last.score + "/" + last.total + "点）";
    }
    btn.onclick = () => selectStudent(i);
    grid.appendChild(btn);
  }
}

function selectStudent(n) {
  currentStudent = n;
  document.querySelectorAll(".ss-btn").forEach((b, i) => {
    b.classList.toggle("sel", i + 1 === n);
  });
  document.getElementById("ss-start-btn").disabled = false;
}

function startQuiz() {
  if (!currentStudent) return;
  document.getElementById("ss-wrap").style.display = "none";
  document.getElementById("quiz-wrap").style.display = "block";
  document.getElementById("student-badge").textContent = "出席番号 " + currentStudent + " 番";
  initQuiz();
}

function backToSelect() {
  document.getElementById("quiz-wrap").style.display = "none";
  document.getElementById("ss-wrap").style.display  = "block";
  buildStudentSelect();
}

function renderAdminTable() {
  const results = getResults();
  const tbl = document.getElementById("adm-tbl");
  let html = `<thead><tr>
    <th>出席番号</th><th>受験回数</th><th>最新正答率</th><th>平均正答率</th><th>最新の間違い（正答→選択）</th>
  </tr></thead><tbody>`;
  for (let i = 1; i <= 25; i++) {
    const records = results[i] || [];
    if (records.length === 0) {
      html += `<tr><td>${i}番</td><td colspan="4" style="color:#aaa;font-size:12px;">未受験</td></tr>`;
      continue;
    }
    const latest  = records[records.length - 1];
    const avgPct  = Math.round(records.reduce((s, r) => s + r.pct, 0) / records.length);
    const pct     = latest.pct;
    const color   = pct >= 80 ? "#639922" : pct >= 60 ? "#D97706" : "#A32D2D";
    const wrongHtml = latest.wrong.length === 0
      ? '<span style="color:#639922;font-size:12px;">全問正解！</span>'
      : '<div class="wrong-txt">' + latest.wrong.map(w =>
          `<b>${esc(w.correct)}</b> → ${esc(w.chosen)}<br><span style="color:#888;font-size:10px;">${esc(w.meaning)}</span>`
        ).join('<br>') + '</div>';
    html += `<tr>
      <td style="font-weight:500;">${i}番</td>
      <td style="text-align:center;">${records.length}回</td>
      <td>
        <span style="font-weight:500;color:${color};">${pct}%</span>
        <span style="font-size:11px;color:#888;"> (${latest.score}/${latest.total})</span><br>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
      </td>
      <td style="text-align:center;color:#6b6b68;">${avgPct}%</td>
      <td>${wrongHtml}</td>
    </tr>`;
  }
  html += "</tbody>";
  tbl.innerHTML = html;
}

function exportCSV() {
  const results = getResults();
  const rows = [["出席番号","受験回数","最新正答率(%)","平均正答率(%)","最新の間違い（正答→選択）"]];
  for (let i = 1; i <= 25; i++) {
    const records = results[i] || [];
    if (records.length === 0) { rows.push([i+"番","0","","",""]); continue; }
    const latest  = records[records.length - 1];
    const avgPct  = Math.round(records.reduce((s,r) => s + r.pct, 0) / records.length);
    const wrongStr = latest.wrong.map(w => w.correct + "→" + w.chosen).join(" / ");
    rows.push([i+"番", records.length, latest.pct, avgPct, wrongStr]);
  }
  const csv  = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(",")).join("\n");
  const blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], {type:"text/csv"});
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = "情報クイズ結果_" + new Date().toLocaleDateString("ja-JP").replace(/\//g,"-") + ".csv";
  a.click();
}

function clearData() {
  if (confirm("全員の成績データを削除しますか？")) {
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
    renderAdminTable();
  }
}

// ---- 結果保存 ----
function saveStudentResult(score, total, wrongItems) {
  if (!currentStudent) return;
  const results = getResults();
  if (!results[currentStudent]) results[currentStudent] = [];
  const record = {
    date:  new Date().toLocaleString("ja-JP"),
    score, total,
    pct:   Math.round(score / total * 100),
    wrong: wrongItems
  };
  results[currentStudent].push(record);
  saveResults(results);

  sendToGas({
    student: currentStudent + "番",
    score, total,
    pct:   record.pct,
    date:  record.date,
    wrong: wrongItems.map(w => w.correct + "→" + w.chosen + "（" + w.meaning + "）")
  }).catch(() => {});
}

function getGasUrl() {
  try { return localStorage.getItem(GAS_KEY) || GAS_DEFAULT; } catch { return GAS_DEFAULT; }
}
function saveGasUrl() {
  const url = document.getElementById("gas-url-input").value.trim();
  try { localStorage.setItem(GAS_KEY, url); } catch {}
  const st = document.getElementById("gas-status");
  st.style.color   = "#639922";
  st.textContent   = url ? "✅ URLを保存しました" : "URLを削除しました";
}
function testGasUrl() {
  const url = getGasUrl();
  const st  = document.getElementById("gas-status");
  if (!url) { st.style.color="#A32D2D"; st.textContent="⚠️ URLが設定されていません"; return; }
  st.style.color="#6b6b68"; st.textContent="送信中...";
  sendToGas({ student:"テスト", score:20, total:20, pct:100, date:new Date().toLocaleString("ja-JP"), wrong:[] })
    .then(() => { st.style.color="#639922"; st.textContent="✅ テスト送信成功！スプレッドシートを確認してください"; })
    .catch(e  => { st.style.color="#A32D2D"; st.textContent="❌ 送信失敗：" + e.message; });
}
function sendToGas(data) {
  const url = getGasUrl();
  if (!url) return Promise.resolve();
  return fetch(url, {
    method: "POST",
    mode:   "no-cors",
    headers: { "Content-Type": "application/json" },
    body:   JSON.stringify(data)
  });
}

const QUIZ_SIZE = 20;
let quizQ = [], current = 0, selectedAns = [], answeredArr = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initQuiz() {
  const pool = shuffle(VOCAB).slice(0, QUIZ_SIZE);
  quizQ = pool.map(q => {
    const others  = VOCAB.filter(w => w.word_clean !== q.word_clean);
    const choices = shuffle([q, ...shuffle(others).slice(0, 4)]);
    return { q, choices };
  });
  current     = 0;
  selectedAns = new Array(QUIZ_SIZE).fill(null);
  answeredArr = new Array(QUIZ_SIZE).fill(false);
  document.getElementById("nav-row").style.display = "none";
  document.getElementById("prog").style.width = (1 / QUIZ_SIZE * 100) + "%";
  renderQuiz();
}

function renderQuiz() {
  const { q, choices } = quizQ[current];
  const isAns = answeredArr[current];
  const sel   = selectedAns[current];

  document.getElementById("prog").style.width    = ((current + 1) / QUIZ_SIZE * 100) + "%";
  document.getElementById("q-counter").textContent = (current + 1) + " / " + QUIZ_SIZE;

  const choicesHTML = choices.map(c => {
    let cls = "choice-btn";
    if (isAns) {
      cls += " disabled";
      if (c.word_clean === q.word_clean)   cls += " correct";
      else if (c.word_clean === sel) cls += " wrong";
    }
    const safeVal = c.word_clean.replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    return `<button class="${cls}" onclick="choose('${safeVal}')">${esc(c.word_clean)}</button>`;
  }).join("");

  const fbHTML = isAns
    ? `<div class="feedback show ${sel === q.word_clean ? 'correct' : 'wrong'}">
        ${sel === q.word_clean
          ? '✅ 正解！　<b>' + esc(q.word_clean) + '</b>'
          : '❌ 不正解。正解は <b>' + esc(q.word_clean) + '</b>（あなたの答え：' + esc(sel) + '）'}
       </div>`
    : '<div class="feedback"></div>';

  const isLast = current === QUIZ_SIZE - 1;
  document.getElementById("quiz-body").innerHTML = `
    <div class="card">
      <div class="q-num">問題 ${current + 1} / ${QUIZ_SIZE}</div>
      <div class="q-meaning">${esc(q.meaning)}</div>
      <div class="choices-5">${choicesHTML}</div>
      ${fbHTML}
    </div>`;

  // ナビ
  const navRow = document.getElementById("nav-row");
  const nextBtn = document.getElementById("next-btn");
  if (isAns) {
    navRow.style.display  = "flex";
    nextBtn.textContent   = isLast ? "結果を見る →" : "次へ →";
    nextBtn.disabled      = false;
  } else {
    navRow.style.display = "none";
  }
}

function choose(val) {
  if (answeredArr[current]) return;
  selectedAns[current]  = val;
  answeredArr[current]  = true;
  renderQuiz();
}

function nextQ() {
  if (current === QUIZ_SIZE - 1) { showResult(); return; }
  current++;
  renderQuiz();
}

function showResult() {
  let score = 0;
  const wrongItems = [];
  quizQ.forEach(({ q }, i) => {
    const ok = selectedAns[i] === q.word_clean;
    if (ok) score++;
    else wrongItems.push({ meaning: q.meaning, correct: q.word_clean, chosen: selectedAns[i] || "未回答" });
  });
  const pct = Math.round(score / QUIZ_SIZE * 100);

  saveStudentResult(score, QUIZ_SIZE, wrongItems);

  const msg = pct === 100 ? "🎉 満点です！素晴らしい！全問正解、完璧です！"
    : pct >= 80 ? "👏 よくできました！あと少しで満点です。"
    : pct >= 60 ? "📚 まあまあです。間違えた問題を復習しましょう。"
    : "💪 もう一度チャレンジしてみましょう！";

  document.getElementById("nav-row").style.display = "none";
  document.getElementById("prog").style.width = "100%";

  const reviewH = quizQ.map(({ q }, i) => {
    const ok  = selectedAns[i] === q.word_clean;
    const ans = ok
      ? `<span class="ans-correct">${esc(q.word_clean)}</span>`
      : `<span class="ans-correct">${esc(q.word_clean)}</span> <span class="ans-wrong">（あなたの答え: ${esc(selectedAns[i] || "未回答")}）</span>`;
    return `<div class="review-item">
      <div class="review-row">
        <span class="mark ${ok ? 'ok' : 'ng'}">${ok ? '○' : '×'}</span>
        <span><b>問${i + 1}.</b> ${esc(q.meaning)}　→　${ans}</span>
      </div>
    </div>`;
  }).join("");

  document.getElementById("quiz-body").innerHTML = `
    <div class="result-card">
      <div class="score-big">${score}<span class="score-denom"> / ${QUIZ_SIZE}</span></div>
      <div class="score-pct">正解率 ${pct}%</div>
      <div class="score-msg">${msg}</div>
      <div class="review-list">${reviewH}</div><br>
      <button class="btn primary restart-btn" onclick="initQuiz()">もう一度挑戦する（問題をランダムに変更）</button>
      <button class="btn restart-btn" onclick="backToSelect()" style="margin-left:8px;">出席番号選択に戻る</button>
      <div class="sync-note" id="sync-note"></div>
    </div>`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

/* ================================================================
   初期化
   ================================================================ */
buildStudentSelect();
</script>
